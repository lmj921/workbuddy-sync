rules:

  # Story 催单
  - type: story
    name_keyword: "maple_A1"
    skip_statuses:
      - "status_5"       # 待验收
      - "status_7"       # 验收通过
      - "status_9"       # 挂起
      - "status_10"      # 无需测试
      - "status_12"      # 暂时无法测试
      - "resolved"       # 已完成
      - "rejected"       # 已拒绝
    status_map:
      planning: "规划中"
      developing: "实现中"
      resolved: "已完成"
      rejected: "已拒绝"
      status_5: "待验收"
      status_7: "验收通过"
      status_8: "测试中"
      status_9: "挂起"
      status_10: "无需测试"
      status_12: "暂时无法测试"
    message_template:
      title: "⏰ Maple Story 催单提醒"
      footer: |
        📌 **状态操作说明：**
        > 1. 正在做的 → 请转到「**实现中**」
        > 2. 已完成的 → 请转到「**待验收**」并备注"无须测试"

